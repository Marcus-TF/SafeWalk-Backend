# SafeWalk Backend - Configuração de Produção
# Copie este arquivo para application-prod.properties e ajuste conforme necessário
# Execute com: java -jar safewalk-backend.jar --spring.profiles.active=prod

# Server Configuration
server.port=${PORT:8080}
spring.application.name=safewalk-backend

# Database Configuration (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/safewalk_prod}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:CHANGE_THIS}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# IMPORTANTE: Use variáveis de ambiente em produção!
jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_A_VERY_LONG_AND_SECURE_SECRET_KEY_AT_LEAST_256_BITS}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
# Configure com o domínio real do seu frontend
cors.allowed.origins=${CORS_ORIGINS:https://safewalk.com,https://www.safewalk.com}

# Logging
logging.level.com.safewalk=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Logging to file
logging.file.name=logs/safewalk.log
logging.file.max-size=10MB
logging.file.max-history=30

# Security Headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Actuator (para monitoramento)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# SSL/TLS (se aplicável)
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=CHANGE_THIS
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=safewalk

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# IMPORTANTE: Desabilite o DataLoader em produção
# Comente a anotação @Component na classe DataLoader.java
